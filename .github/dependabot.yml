version: 2
updates:
  # npm dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
      ui:
        patterns:
          - "@xyflow/*"
          - "framer-motion"
          - "lucide-react"

  # Cargo dependencies (Rust backend)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"
      observability:
        patterns:
          - "tracing"
          - "tracing-*"
          - "opentelemetry"
          - "opentelemetry-*"
          - "prometheus"
      crypto:
        patterns:
          - "aes-gcm"
          - "sha2"
          - "base64"
          - "hex"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"