name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create_release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        run: |
          IS_PRERELEASE=false
          if echo "${{ github.ref_name }}" | grep -qE 'alpha|beta|rc'; then
            IS_PRERELEASE=true
          fi
          gh release create "${{ github.ref_name }}" \
            --title "MCP Fusion ${{ github.ref_name }}" \
            --generate-notes \
            ${IS_PRERELEASE:+--prerelease}
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Build Tauri (Windows)
        run: npx tauri build --target x86_64-pc-windows-msvc
      - name: Upload Windows Installer
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -Recurse -Include "*.exe","*.msi" -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName })
          if ($files.Count -gt 0) {
            gh release upload "${{ needs.create-release.outputs.tag }}" $files --clobber
          } else {
            Write-Host "No installer files found, skipping upload"
          }
        env:
          GH_TOKEN: ${{ github.token }}

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build Tauri (macOS)
        run: npx tauri build --target ${{ matrix.target }}
      - name: Upload macOS DMG
        run: |
          shopt -s nullglob
          files=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${{ needs.create-release.outputs.tag }}" "${files[@]}" --clobber
          else
            echo "No DMG files found, skipping upload"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build Tauri (Linux)
        run: npx tauri build --target ${{ matrix.target }}
      - name: Upload Linux Artifacts
        run: |
          shopt -s nullglob
          files=(src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
                 src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
                 src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${{ needs.create-release.outputs.tag }}" "${files[@]}" --clobber
          else
            echo "No Linux artifacts found, skipping upload"
          fi
        env:
          GH_TOKEN: ${{ github.token }}