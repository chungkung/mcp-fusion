name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create_release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        run: |
          IS_PRERELEASE=false
          if echo "${{ github.ref_name }}" | grep -qE 'alpha|beta|rc'; then
            IS_PRERELEASE=true
          fi
          gh release create "${{ github.ref_name }}" \
            --title "MCP Fusion ${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            ${IS_PRERELEASE:+--prerelease}
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build Frontend
        run: npm run build:frontend
      - name: Build Tauri (Windows)
        run: npx tauri build --target x86_64-pc-windows-msvc
      - name: Upload Windows Installer
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe \
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build Frontend
        run: npm run build:frontend
      - name: Build Tauri (macOS)
        run: npx tauri build --target ${{ matrix.target }}
      - name: Upload macOS DMG
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build Frontend
        run: npm run build:frontend
      - name: Build Tauri (Linux)
        run: npx tauri build --target ${{ matrix.target }}
      - name: Upload Linux Artifacts
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage \
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb \
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}